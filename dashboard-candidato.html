<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Proceso - AACOM</title>
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: var(--bg-dark); color: white; }
    .dashboard-header {
      background: var(--bg-card);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 1rem 0;
    }
    .timeline {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1rem;
    }
    .step {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      position: relative;
    }
    .step::before {
      content: '';
      position: absolute;
      left: 1.25rem;
      top: 3rem;
      bottom: -2rem;
      width: 2px;
      background: rgba(255,255,255,0.1);
      z-index: 0;
    }
    .step:last-child::before { display: none; }
    
    .step-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: var(--bg-alt);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      z-index: 1;
      border: 2px solid var(--bg-card);
      flex-shrink: 0;
    }
    .step.completed .step-icon {
      background: var(--primary);
      color: white;
    }
    .step.active .step-icon {
      background: var(--bg-card);
      color: var(--primary);
      border-color: var(--primary);
    }
    
    .step-content {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 1rem;
      flex: 1;
      border: 1px solid rgba(255,255,255,0.05);
      opacity: 0.6;
    }
    .step.completed .step-content, .step.active .step-content {
      opacity: 1;
    }
    .step.active .step-content {
      border-color: rgba(35, 151, 111, 0.3);
      box-shadow: 0 4px 20px rgba(35, 151, 111, 0.1);
    }
    
    .step-title {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .step-status {
      font-size: 0.8rem;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      background: rgba(255,255,255,0.1);
    }
    .step.completed .step-status { background: rgba(35, 151, 111, 0.2); color: var(--primary); }
    .step.active .step-status { background: rgba(255, 255, 255, 0.1); color: white; }

    .action-area {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .file-input-wrapper {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .file-input { display: none; }
    .file-label {
      background: rgba(255,255,255,0.1);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .file-label:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <header class="dashboard-header">
    <div class="container flex justify-between items-center">
      <img src="assets/logo.png" alt="AACOM Seguros" style="height: 40px; filter: brightness(0) invert(1);">
      <div class="flex items-center gap-4">
        <span id="user-name" class="text-muted">Cargando perfil...</span>
        <button id="btn-logout" class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.85rem;">Cerrar Sesión</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="text-center mt-12 mb-8">
      <h1 class="text-3xl font-bold">Tu Proceso de Selección</h1>
      <p class="text-muted mt-2">Completa las etapas para unirte al equipo AACOM.</p>
    </div>

    <div class="timeline" id="timeline-container">
      <!-- Steps will be rendered here by JS -->
    </div>
  </div>

  <script type="module">
    import { auth, db, storage, onAuthStateChanged, signOut, doc, getDoc, updateDoc, ref, uploadBytes, getDownloadURL } from './firebase-config.js';

    const stepsData = [
      { id: 1, title: "Registro", desc: "Creación de perfil en el portal.", action: null },
      { id: 2, title: "Revisión de CV", desc: "Sube tu currículum actualizado para que nuestro equipo lo revise.", action: "upload_cv" },
      { id: 3, title: "Prueba POP", desc: "Prueba de Orientación de Perfil Comercial.", action: "take_test" },
      { id: 4, title: "Primera Cita", desc: "Entrevista inicial para conocer a la empresa.", action: "wait_interview" },
      { id: 5, title: "Proyecto 200", desc: "Sube tu archivo de Proyecto 200 en Excel.", action: "upload_excel" },
      { id: 6, title: "Entrevista de Carrera", desc: "Entrevista con el Director Comercial o General.", action: "wait_interview" },
      { id: 7, title: "Envío de Documentación", desc: "Documentación completa para tu alta.", action: "upload_docs" },
      { id: 8, title: "¡Bienvenido al Equipo!", desc: "El proceso ha concluido exitosamente.", action: null }
    ];

    let currentUser = null;
    let userData = null;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);
        
        if (docSnap.exists()) {
          userData = docSnap.data();
          document.getElementById('user-name').textContent = userData.nombre;
          renderTimeline(userData.etapaActual);
        } else {
          alert("No se encontraron datos del usuario.");
        }
      } else {
        window.location.href = "reclutamiento.html";
      }
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = "reclutamiento.html";
      });
    });

    function renderTimeline(currentStep) {
      const container = document.getElementById('timeline-container');
      container.innerHTML = '';

      stepsData.forEach(step => {
        let statusClass = '';
        let statusText = '';
        let iconHtml = step.id;

        if (step.id < currentStep) {
          statusClass = 'completed';
          statusText = 'Completado';
          iconHtml = '<i class="fas fa-check"></i>';
        } else if (step.id === currentStep) {
          statusClass = 'active';
          if (userData.estadoEvaluacion === 'pendiente_revision') {
            statusText = 'En Revisión Manual';
          } else {
            statusText = 'En Curso';
          }
        } else {
          statusText = 'Bloqueado';
          iconHtml = '<i class="fas fa-lock" style="font-size: 0.9rem;"></i>';
        }

        const stepDiv = document.createElement('div');
        stepDiv.className = `step ${statusClass}`;
        
        let actionHtml = '';
        if (statusClass === 'active' && userData.estadoEvaluacion !== 'pendiente_revision') {
          if (step.action === 'upload_cv') {
            actionHtml = `
              <div class="action-area">
                <p class="text-sm mb-2">Por favor, sube tu CV en formato PDF.</p>
                <div class="file-input-wrapper">
                  <label for="cv-upload" class="file-label"><i class="fas fa-file-upload mr-2"></i> Seleccionar Archivo</label>
                  <input type="file" id="cv-upload" class="file-input" accept=".pdf,.doc,.docx">
                  <button class="btn btn-primary btn-sm" onclick="uploadFile('cv-upload', 'cv_url', 3)">Enviar CV</button>
                </div>
                <p id="upload-status-cv" class="text-sm mt-2" style="color:var(--primary);"></p>
              </div>`;
          } else if (step.action === 'take_test') {
            actionHtml = `
              <div class="action-area">
                <button class="btn btn-primary" onclick="window.location.href='prueba-pop.html'">Realizar Prueba POP</button>
              </div>`;
          } else if (step.action === 'upload_excel') {
            actionHtml = `
              <div class="action-area">
                <p class="text-sm mb-2">Por favor, sube tu archivo Excel (Proyecto 200).</p>
                <div class="file-input-wrapper">
                  <label for="excel-upload" class="file-label"><i class="fas fa-file-excel mr-2"></i> Seleccionar Excel</label>
                  <input type="file" id="excel-upload" class="file-input" accept=".xlsx,.xls">
                  <button class="btn btn-primary btn-sm" onclick="uploadFile('excel-upload', 'proyecto200_url', 6)">Enviar Proyecto</button>
                </div>
                <p id="upload-status-excel" class="text-sm mt-2" style="color:var(--primary);"></p>
              </div>`;
          } else if (step.action === 'upload_docs') {
            actionHtml = `
              <div class="action-area">
                <p class="text-sm mb-2">Sube un archivo ZIP o PDF con tu documentación completa.</p>
                <div class="file-input-wrapper">
                  <label for="docs-upload" class="file-label"><i class="fas fa-folder-open mr-2"></i> Seleccionar Archivo</label>
                  <input type="file" id="docs-upload" class="file-input" accept=".zip,.pdf">
                  <button class="btn btn-primary btn-sm" onclick="uploadFile('docs-upload', 'docs_url', 8)">Enviar Documentos</button>
                </div>
                <p id="upload-status-docs" class="text-sm mt-2" style="color:var(--primary);"></p>
              </div>`;
          } else if (step.action === 'wait_interview') {
            actionHtml = `
              <div class="action-area">
                <p class="text-sm text-primary"><i class="fas fa-calendar-check mr-2"></i> Nos comunicaremos contigo para agendar tu cita.</p>
              </div>`;
          }
        }

        stepDiv.innerHTML = `
          <div class="step-icon">${iconHtml}</div>
          <div class="step-content">
            <div class="step-title">
              Etapa ${step.id}: ${step.title}
              <span class="step-status">${statusText}</span>
            </div>
            <p class="text-sm">${step.desc}</p>
            ${actionHtml}
          </div>
        `;
        container.appendChild(stepDiv);
      });
    }

    // Global function for uploading files
    window.uploadFile = async (inputId, dbField, nextStep) => {
      const fileInput = document.getElementById(inputId);
      const statusP = document.getElementById('upload-status-' + inputId.split('-')[0]);
      
      if (!fileInput.files.length) {
        alert("Por favor selecciona un archivo primero.");
        return;
      }
      
      const file = fileInput.files[0];
      statusP.textContent = "Subiendo archivo... por favor espera.";
      
      try {
        const fileRef = ref(storage, `candidatos/${currentUser.uid}/${inputId}_${file.name}`);
        await uploadBytes(fileRef, file);
        const url = await getDownloadURL(fileRef);
        
        const updateData = { etapaActual: nextStep };
        updateData[dbField] = url;

        // Si sube Proyecto 200 o Documentación, podemos dejarlo en pendiente de revisión o avanzar directo.
        // El prompt dice que avanzar de etapa requiere aprobación manual en ciertas etapas.
        // Aquí pasamos a la siguiente etapa pero la etapa siguiente podría ser la de espera.
        // Dejaremos que simplemente avance por ahora, o cambiaremos el estado a "pendiente_revision".
        
        await updateDoc(doc(db, "users", currentUser.uid), updateData);
        
        statusP.textContent = "¡Archivo subido exitosamente!";
        setTimeout(() => {
          window.location.reload();
        }, 1500);

      } catch (error) {
        console.error(error);
        statusP.textContent = "Error al subir el archivo: " + error.message;
        statusP.style.color = "#ef4444";
      }
    };
  </script>
</body>
</html>
