<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Bienvenido al Equipo! - AACOM</title>
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: var(--bg-alt);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 1rem;
    }
    .welcome-container {
      background: var(--bg-card);
      padding: 3rem 2rem;
      border-radius: 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      max-width: 600px;
      width: 100%;
      animation: fadeIn 0.8s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-container {
      margin-bottom: 2rem;
    }
    .logo-container img {
      max-height: 80px;
    }
    .icon-success {
      font-size: 4rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }
    h1 {
      color: var(--primary);
      margin-bottom: 1rem;
      font-size: 2.2rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <div class="logo-container">
      <img src="assets/logo.png" alt="AACOM Seguros">
    </div>
    <div class="icon-success">
      <i class="fas fa-check-circle"></i>
    </div>
    <h1>¡Felicidades y Bienvenido!</h1>
    <p>Has completado exitosamente todo tu proceso de selección.<br><br>En breve, el equipo de <strong>AACOM</strong> se comunicará contigo para acordar tu fecha de inicio y brindarte todos los detalles sobre tu onboarding.</p>
    <button class="btn btn-primary" onclick="cerrarSesion()" style="padding: 0.8rem 2rem; font-size: 1rem;"><i class="fas fa-sign-out-alt mr-2"></i>Cerrar Sesión y Salir</button>
  </div>

  <script type="module">
    import { auth } from './firebase-config.js';
    import { signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    window.cerrarSesion = async () => {
      try {
        await signOut(auth);
        window.location.href = "reclutamiento.html";
      } catch (error) {
        console.error("Error al cerrar sesión", error);
      }
    };
  </script>
</body>
</html>
